# ============================================================
# EssentialsBE - นิยามชุดไอเทม (kit)
#
# ต่อ kit กำหนดได้:
#   cooldown: วินาที (-1 = รับได้ครั้งเดียวตลอดกาล, 0 = ไม่มี cooldown)
#   public:  true = ทุกคนใช้ได้ / false = ต้องมี essentials.kits.<ชื่อ> (OP ผ่านเสมอ)
#   auto-equip: true = สวมเกราะให้อัตโนมัติถ้าช่องว่าง
#   items: รายการไอเทม (item id ของ Bedrock, จำนวน, ชื่อ/lore/เอนชานต์ ถ้ามี)
# ============================================================

kits:
  # ชุดเริ่มต้น - รับได้ครั้งเดียวตลอดกาล
  starter:
    cooldown: -1
    public: true
    auto-equip: true
    items:
      - item: minecraft:stone_sword
        amount: 1
        name: "§bดาบมือใหม่"
      - item: minecraft:stone_pickaxe
        amount: 1
      - item: minecraft:stone_axe
        amount: 1
      - item: minecraft:bread
        amount: 16
      - item: minecraft:leather_helmet
        amount: 1
      - item: minecraft:leather_chestplate
        amount: 1
      - item: minecraft:leather_leggings
        amount: 1
      - item: minecraft:leather_boots
        amount: 1
      - item: minecraft:torch
        amount: 32

  # ชุดรายวัน - รับได้ทุก 24 ชั่วโมง
  daily:
    cooldown: 86400
    public: true
    auto-equip: false
    items:
      - item: minecraft:cooked_beef
        amount: 8
      - item: minecraft:iron_ingot
        amount: 4
      - item: minecraft:experience_bottle
        amount: 8
      - item: minecraft:golden_apple
        amount: 1
        name: "§6แอปเปิลรายวัน"
        lore:
          - "§7ของขวัญประจำวันจากเซิร์ฟเวอร์"
